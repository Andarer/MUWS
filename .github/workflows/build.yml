name: Build APK from web-content

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build WebView APK
        uses: jonaswinkler/webview-apk-builder@v1
        with:
          source-dir: web-content
          app-name: "MetaMindMap Pro"
          package-name: "com.muws.metamindmap"
          icon: "https://raw.githubusercontent.com/Andarer/MUWS/main/web-content/favicon.svg"
          color-primary: "#007AFF"
          color-primary-dark: "#0055CC"
          enable-immersive: true
          enable-fullscreen: true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MetaMindMap-Pro
          path: output/*.apk
