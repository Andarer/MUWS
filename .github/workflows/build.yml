name: Build MUWS APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK (minimal)
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34'

      - name: Create Android project structure
        run: |
          # Корневая папка Android-проекта
          mkdir -p project
          cd project

          # Создаём модуль app с нужными подпапками
          mkdir -p app/src/main/java/com/muws
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/assets/app

      - name: Copy web content to assets
        run: |
          # Предполагаем, что ваши HTML/JS/CSS лежат в корне репозитория в папке web-content/
          if [ -d "web-content" ]; then
            cp -r web-content/* project/app/src/main/assets/app/
          else
            echo "⚠️ Папка web-content не найдена. APK будет пустым!"
            mkdir -p project/app/src/main/assets/app
            echo "<html><body><h1>MUWS App</h1><p>Place your web files in 'web-content/' folder.</p></body></html>" > project/app/src/main/assets/app/index.html
          fi

      - name: Generate required resource files
        run: |
          cd project

          # strings.xml
          cat > app/src/main/res/values/strings.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">MUWS</string>
          </resources>
          EOF

          # colors.xml (может понадобиться)
          cat > app/src/main/res/values/colors.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="white">#FFFFFF</color>
              <color name="black">#000000</color>
          </resources>
          EOF

          # Заглушка для иконки (одноцветный PNG, чтобы пройти сборку)
          # Генерируем простой 72x72 PNG через ImageMagick (предустановлен в ubuntu-latest)
          convert -size 72x72 xc:#3F51B5 app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert -size 72x72 xc:#3F51B5 app/src/main/res/mipmap-hdpi/ic_launcher_round.png

      - name: Create AndroidManifest.xml
        run: |
          cat > project/app/src/main/AndroidManifest.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.muws">

              <uses-permission android:name="android.permission.INTERNET" />

              <application
                  android:label="@string/app_name"
                  android:icon="@mipmap/ic_launcher"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:theme="@android:style/Theme.DeviceDefault.NoActionBar">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:configChanges="orientation|screenSize|keyboardHidden">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Create MainActivity.java
        run: |
          cat > project/app/src/main/java/com/muws/MainActivity.java <<'EOF'
          package com.muws;

          import android.app.Activity;
          import android.os.Bundle;
          import android.webkit.WebView;
          import android.webkit.WebSettings;
          import android.webkit.WebViewClient;

          public class MainActivity extends Activity {
              private WebView webView;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);

                  webView = new WebView(this);
                  WebSettings settings = webView.getSettings();

                  settings.setJavaScriptEnabled(true);
                  settings.setDomStorageEnabled(true);
                  settings.setDatabaseEnabled(true);
                  settings.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);
                  settings.setUserAgentString("MUWS/1.0");

                  // Оставляем ссылки внутри WebView
                  webView.setWebViewClient(new WebViewClient());

                  webView.loadUrl("file:///android_asset/app/index.html");
                  setContentView(webView);
              }

              @Override
              public void onBackPressed() {
                  if (webView.canGoBack()) {
                      webView.goBack();
                  } else {
                      super.onBackPressed();
                  }
              }
          }
          EOF

      - name: Create Gradle build files
        run: |
          cd project

          # settings.gradle
          echo "rootProject.name = 'MUWS'" > settings.gradle
          echo "include ':app'" >> settings.gradle

          # Корневой build.gradle
          cat > build.gradle <<'EOF'
          plugins {
              id 'com.android.application' version '8.2.2' apply false
          }
          EOF

          # app/build.gradle
          cat > app/build.gradle <<'EOF'
          plugins {
              id 'com.android.application'
          }

          android {
              namespace 'com.muws'
              compileSdk 34

              defaultConfig {
                  applicationId "com.muws"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }

              buildTypes {
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
                  debug {
                      debuggable true
                  }
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }

          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.webkit:webkit:1.10.0'
          }
          EOF

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5

      - name: Build debug APK
        run: |
          cd project
          gradle assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MUWS-Debug-APK
          path: project/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload logs (if failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            project/app/build/reports/
            ~/.gradle/daemon/*/daemon-*.log
