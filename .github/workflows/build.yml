name: Build MUWS APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses
        run: yes | sdkmanager --licenses

      - name: Install SDK packages
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Create project structure
        run: |
          mkdir -p project/app/src/main/{assets/app,java/com/muws,res/layout}
          cp -r app/* project/app/src/main/assets/app/ 2>/dev/null || true

      - name: Create AndroidManifest.xml
        run: |
          cat > project/app/src/main/AndroidManifest.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.muws">
              
              <uses-permission android:name="android.permission.INTERNET" />
              
              <application
                  android:label="@string/app_name"
                  android:icon="@mipmap/ic_launcher">
                  
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:theme="@android:style/Theme.NoTitleBar.Fullscreen">
                      
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Create MainActivity.java
        run: |
          cat > project/app/src/main/java/com/muws/MainActivity.java <<'EOF'
          package com.muws;

          import android.app.Activity;
          import android.os.Bundle;
          import android.webkit.WebView;
          import android.webkit.WebSettings;

          public class MainActivity extends Activity {
              private WebView webView;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);

                  webView = new WebView(this);
                  WebSettings settings = webView.getSettings();
                  
                  settings.setJavaScriptEnabled(true);
                  settings.setDomStorageEnabled(true);
                  settings.setDatabaseEnabled(true);
                  settings.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);
                  settings.setUserAgentString("MUWS/1.0");

                  webView.loadUrl("file:///android_asset/app/index.html");
                  setContentView(webView);
              }

              @Override
              public void onBackPressed() {
                  if (webView.canGoBack()) {
                      webView.goBack();
                  } else {
                      super.onBackPressed();
                  }
              }
          }
          EOF

      - name: Create root build.gradle
        run: |
          cat > project/build.gradle <<'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.0'
              }
          }

          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          EOF

      - name: Create settings.gradle
        run: |
          echo "include ':app'" > project/settings.gradle

      - name: Create app/build.gradle
        run: |
          cat > project/app/build.gradle <<'EOF'
          plugins {
              id 'com.android.application'
          }

          android {
              namespace 'com.muws'
              compileSdk 34

              defaultConfig {
                  applicationId "com.muws"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }

              buildTypes {
                  debug {
                      debuggable true
                  }
                  release {
                      minifyEnabled true
                      shrinkResources true
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_11
                  targetCompatibility JavaVersion.VERSION_11
              }
          }

          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.webkit:webkit:1.7.0'
          }
          EOF

      - name: Download Gradle
        run: |
          cd project
          MAX_ATTEMPTS=3
          ATTEMPT=1
          
          while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
            echo "Downloading Gradle (attempt $ATTEMPT/$MAX_ATTEMPTS)..."
            if curl -L --max-time 300 --retry 2 \
              https://services.gradle.org/distributions/gradle-8.2-bin.zip \
              -o gradle.zip && \
              unzip -t gradle.zip > /dev/null 2>&1; then
              echo "Gradle downloaded and verified successfully"
              unzip -q gradle.zip
              rm -f gradle.zip
              mv gradle-8.2 gradle
              break
            else
              echo "Failed attempt $ATTEMPT, retrying..."
              rm -f gradle.zip
              ATTEMPT=$((ATTEMPT + 1))
            fi
          done
          
          if [ $ATTEMPT -gt $MAX_ATTEMPTS ]; then
            echo "Failed to download Gradle after $MAX_ATTEMPTS attempts"
            exit 1
          fi

      - name: Build APK (Debug)
        run: |
          cd project
          chmod +x gradle/bin/gradle
          ./gradle/bin/gradle assembleDebug --info

      - name: Upload APK Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MUWS-Debug-APK
          path: project/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload Build Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: project/app/build/outputs/
