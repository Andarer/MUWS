name: Build MUWS APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Clone minimal WebView template
        run: git clone https://github.com/hybridgroup/android-webview-template android-template

      - name: Copy app files
        run: |
          mkdir -p android-template/app/src/main/assets/app
          cp -r app/* android-template/app/src/main/assets/app/

      - name: Build APK
        run: |
          cd android-template
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: muws-apk
          path: android-template/app/build/outputs/apk/debug/app-debug.apk
