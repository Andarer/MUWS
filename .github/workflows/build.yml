name: Build MUWS APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34'

      - name: Create Android project structure
        run: |
          mkdir -p project
          cd project
          mkdir -p app/src/main/java/com/muws
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/assets/app

      - name: Copy web content to assets
        run: |
          if [ -d "web-content" ]; then
            cp -r web-content/* project/app/src/main/assets/app/
          else
            echo "⚠️ Папка web-content не найдена. APK будет пустым!"
            mkdir -p project/app/src/main/assets/app
            echo "<html><body><h1>MUWS App</h1><p>Place your web files in 'web-content/' folder.</p></body></html>" > project/app/src/main/assets/app/index.html
          fi

      - name: Install ImageMagick and generate resources
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y imagemagick
          cd project

          # strings.xml
          cat > app/src/main/res/values/strings.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">MetaMindMap Pro</string>
          </resources>
          EOF

          # colors.xml
          cat > app/src/main/res/values/colors.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="white">#FFFFFF</color>
              <color name="black">#000000</color>
          </resources>
          EOF

          # Иконка с мозгом 🧠
          convert -size 72x72 xc:#007AFF \
            -gravity center -pointsize 40 -fill white -annotate +0+0 "🧠" \
            app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert -size 72x72 xc:#007AFF \
            -gravity center -pointsize 40 -fill white -annotate +0+0 "🧠" \
            app/src/main/res/mipmap-hdpi/ic_launcher_round.png

      - name: Create AndroidManifest.xml
        run: |
          cat > project/app/src/main/AndroidManifest.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.muws.metamindmap">

              <uses-permission android:name="android.permission.INTERNET" />

              <application
                  android:label="@string/app_name"
                  android:icon="@mipmap/ic_launcher"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:theme="@android:style/Theme.DeviceDefault.NoActionBar"
                  android:hardwareAccelerated="true"
                  android:usesCleartextTraffic="true">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:theme="@android:style/Theme.DeviceDefault.NoActionBar.Fullscreen"
                      android:configChanges="orientation|screenSize|keyboardHidden|screenLayout|smallestScreenSize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Create MainActivity.java
        run: |
          cat > project/app/src/main/java/com/muws/MainActivity.java <<'EOF'
          package com.muws;

          import android.app.Activity;
          import android.os.Bundle;
          import android.webkit.WebView;
          import android.webkit.WebSettings;
          import android.webkit.WebViewClient;
          import android.webkit.WebResourceRequest;
          import android.webkit.WebResourceError;
          import android.webkit.WebChromeClient;
          import android.webkit.ConsoleMessage;
          import android.util.Log;
          import android.view.View;
          import android.view.WindowManager;

          public class MainActivity extends Activity {
              private WebView webView;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);

                  // Полноэкранный режим с вырезами
                  getWindow().setFlags(
                      WindowManager.LayoutParams.FLAG_LAYOUT_NO_LIMITS,
                      WindowManager.LayoutParams.FLAG_LAYOUT_NO_LIMITS
                  );
                  getWindow().getDecorView().setSystemUiVisibility(
                      View.SYSTEM_UI_FLAG_LAYOUT_STABLE |
                      View.SYSTEM_UI_FLAG_LAYOUT_HIDE_NAVIGATION |
                      View.SYSTEM_UI_FLAG_LAYOUT_FULLSCREEN |
                      View.SYSTEM_UI_FLAG_HIDE_NAVIGATION |
                      View.SYSTEM_UI_FLAG_FULLSCREEN |
                      View.SYSTEM_UI_FLAG_IMMERSIVE_STICKY
                  );

                  webView = new WebView(this);
                  WebSettings settings = webView.getSettings();

                  settings.setJavaScriptEnabled(true);
                  settings.setDomStorageEnabled(true);
                  settings.setDatabaseEnabled(true);
                  settings.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);
                  settings.setUserAgentString("MetaMindMapPro/3.0 (Android)");
                  settings.setAllowFileAccess(true);
                  settings.setAllowContentAccess(true);
                  settings.setLoadWithOverviewMode(true);
                  settings.setUseWideViewPort(true);
                  settings.setSupportZoom(false);
                  settings.setBuiltInZoomControls(false);
                  settings.setDisplayZoomControls(false);
                  settings.setAppCacheEnabled(true);
                  settings.setAppCachePath(getCacheDir().getAbsolutePath());

                  webView.setWebViewClient(new WebViewClient() {
                      @Override
                      public boolean shouldOverrideUrlLoading(WebView view, WebResourceRequest request) {
                          view.loadUrl(request.getUrl().toString());
                          return true;
                      }

                      @Override
                      public void onReceivedError(WebView view, WebResourceRequest request, WebResourceError error) {
                          Log.e("MUWS", "WebView error: " + error.getDescription());
                      }
                  });

                  webView.setWebChromeClient(new WebChromeClient() {
                      @Override
                      public boolean onConsoleMessage(ConsoleMessage consoleMessage) {
                          Log.d("MetaMindMap", consoleMessage.message() + " -- From line " +
                                  consoleMessage.lineNumber() + " of " + consoleMessage.sourceId());
                          return true;
                      }
                  });

                  webView.loadUrl("file:///android_asset/app/index.html");
                  setContentView(webView);
              }

              @Override
              public void onBackPressed() {
                  if (webView.canGoBack()) {
                      webView.goBack();
                  } else {
                      super.onBackPressed();
                  }
              }
          }
          EOF

      - name: Create Gradle build files
        run: |
          cd project

          echo "rootProject.name = 'MetaMindMap'" > settings.gradle
          echo "include ':app'" >> settings.gradle

          cat > build.gradle <<'EOF'
          plugins {
              id 'com.android.application' version '8.2.2' apply false
          }
          EOF

          cat > app/build.gradle <<'EOF'
          plugins {
              id 'com.android.application'
          }

          android {
              namespace 'com.muws.metamindmap'
              compileSdk 34

              defaultConfig {
                  applicationId "com.muws.metamindmap"
                  minSdk 21
                  targetSdk 34
                  versionCode 3
                  versionName "3.0"
              }

              buildTypes {
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
                  debug {
                      debuggable true
                  }
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }

          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.webkit:webkit:1.10.0'
          }
          EOF

      - name: Setup Gradle 8.5
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5

      - name: Generate Gradle Wrapper (safe)
        run: |
          cd project
          # Временно прячем build.gradle, чтобы системный Gradle не читал плагин
          mv build.gradle build.gradle.bak
          gradle wrapper --gradle-version 8.5
          mv build.gradle.bak build.gradle

      - name: Build debug APK
        run: |
          cd project
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: MetaMindMap-Pro-Debug
          path: project/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            project/app/build/reports/
            ~/.gradle/daemon/*/daemon-*.log
