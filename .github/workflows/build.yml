name: Build MUWS APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone template
        run: git clone https://github.com/ionic-team/ionic-native-runner-template android-template

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Copy your app
        run: |
          mkdir -p android-template/app/src/main/assets/app
          cp -r app/* android-template/app/src/main/assets/app/

      - name: Build APK
        run: |
          cd android-template
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: muws-apk
          path: android-template/app/build/outputs/apk/debug/app-debug.apk
